<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior Intern - Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dashboard-body">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <span>Senior<span style="color: #fff; font-weight: 400;">Intern</span></span>
        </div>
        <nav class="sidebar-menu">
            <a href="#" class="menu-item active">📊 Overview</a>
            <a href="#" class="menu-item">📝 Manage Blogs</a>
            <a href="#" class="menu-item">🔬 STEM Projects</a>
            <a href="#" class="menu-item">⚙️ System Metrics</a>
            <a href="#" class="menu-item logout">🚪 Logout</a>
        </nav>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-topbar">
            <h2>Welcome Back, Ariel</h2>
            <div class="user-profile">Admin Mode</div>
        </header>

        <section class="dashboard-content">
            <div class="metrics-grid">
                <div class="stat-card">
                    <h3>Total Blogs</h3>
                    <p class="stat-number">12</p>
                </div>
                <div class="stat-card">
                    <h3>System Stability</h3>
                    <p class="stat-number" style="color: var(--accent-color);">99.9%</p>
                </div>
                <div class="stat-card">
                    <h3>STEM Modules</h3>
                    <p class="stat-number">8</p>
                </div>
            </div>

            <div class="content-panel">
                <h3>System Overview Panel</h3>
                <p>This is where your dynamic tables, form inputs, or database streams will go.</p>
            </div>
        </section>
    </main>

</body>
</html>
