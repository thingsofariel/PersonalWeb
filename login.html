<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <!-- Add your navbar header here -->
   <header>
    <div class="logo">Senior<span style="color: #ffffff; font-weight: 400;">Intern</span></div>
    <input type="checkbox" id="click">
    <label for="click" class="mainicon">
        <div class="menu" id="menu">
            <i class="bi bi-list"></i>
        </div>
    </label>

    <nav class="nav-list">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="skills.html">Skills</a>
        <a href="portofolio.html">Portfolio</a>
        <a href="blog.html">Blog</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

    <div class="login-card">
        <!-- Logo Container -->
        <div class="login-logo">
            <!-- You can replace this with an <img> tag later -->
            <div class="logo-icon"></div> 
        </div>

        <h2>Sign in</h2>
        <p class="subtitle">Welcome back! Please sign in to continue</p>

        <form class="login-form">
            <div class="input-group">
                <label>Email address <span>*</span></label>
                <input type="email" placeholder="Enter your email address" required>
            </div>

            <div class="input-group">
                <label>Password <span>*</span></label>
                <div class="password-wrapper">
                    <input type="password" placeholder="Enter your password" required>
                    <span class="toggle-password">👁</span>
                </div>
            </div>

            <a href="Admindashboard.html" style="text-decoration: none; width: 100%; display: block;">
            <button type="button" class="btn-continue">Continue</button>
        </a>
        </form>
    </div>

</body>
</html>
